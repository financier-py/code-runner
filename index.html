<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Code Runner</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">

  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --accent: #2f81f7;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --success: #238636;
      --error: #da3633;
      --font-ui: 'Inter', sans-serif;
      --font-code: 'Fira Code', monospace;
      --header-h: 56px;
      --tab-bar-h: 0px; /* На десктопе 0 */
    }

    * { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-ui);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- Header --- */
    header {
      height: var(--header-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--panel);
      flex-shrink: 0;
      z-index: 10;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .author-link {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      background: rgba(47, 129, 247, 0.1);
      padding: 3px 6px;
      border-radius: 4px;
    }

    .controls { display: flex; align-items: center; gap: 10px; }

    select {
      background: var(--bg);
      color: var(--text-main);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    .run-btn {
      background: var(--success);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .run-btn:disabled { opacity: 0.5; filter: grayscale(1); }

    /* --- Main Layout --- */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /* Desktop: Split view */
      height: calc(100vh - var(--header-h));
      position: relative;
    }

    .editor-pane, .io-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100%;
    }

    .editor-pane { border-right: 1px solid var(--border); }
    .io-pane { background: #0f0f0f; }

    /* CodeMirror adjustments */
    .CodeMirror {
      flex: 1;
      height: 100%;
      font-family: var(--font-code);
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg) !important;
    }
    .CodeMirror-gutters { background: var(--bg) !important; border-right: 1px solid var(--border); }

    /* IO Section */
    .pane-section {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    
    .pane-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
    }

    textarea#stdin {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 4px;
      padding: 8px;
      font-family: var(--font-code);
      resize: none;
      height: 70px;
      outline: none;
    }
    textarea#stdin:focus { border-color: var(--accent); }

    .output-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 20px 12px;
      font-family: var(--font-code);
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #stdout { color: #e6edf3; }
    #stderr { color: #ff7b72; margin-top: 8px; padding-left: 8px; border-left: 2px solid #da3633; }

    /* --- Ghost Text --- */
    .cm-inline-completion { color: #6e7681; opacity: 0.5; }

    /* --- Status Badge --- */
    .status-badge {
      font-size: 10px; padding: 2px 6px; border-radius: 10px;
      text-transform: uppercase; font-weight: 700;
    }
    .status-idle { background: var(--border); color: var(--text-muted); }
    .status-running { background: #9e6a03; color: #fff; }
    .status-success { background: #238636; color: #fff; }
    .status-error { background: #da3633; color: #fff; }

    /* --- Mobile Tabs (Hidden on Desktop) --- */
    .mobile-tab-bar {
      display: none; /* Desktop hidden */
      height: 50px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    .tab-btn.active {
      color: var(--text-main);
      border-bottom-color: var(--accent);
    }

    /* --- Mobile Responsiveness --- */
    @media (max-width: 768px) {
      :root { --tab-bar-h: 50px; }
      
      h1 span { display: none; } /* Скрываем текст логотипа, оставляем место */
      header { padding: 0 10px; }
      
      .main-grid {
        display: block; /* Убираем грид */
        height: calc(100vh - var(--header-h) - var(--tab-bar-h));
        position: relative;
      }

      /* Панели накладываются друг на друга */
      .editor-pane, .io-pane {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: var(--bg);
        z-index: 1;
        visibility: hidden; /* Скрываем неактивную */
      }

      /* Класс для активной вкладки */
      .pane-active {
        visibility: visible;
        z-index: 2;
      }

      .mobile-tab-bar { display: flex; } /* Показываем табы */
    }
  </style>
</head>
<body>

<header>
  <h1>
    <span>🚀</span>
    <a href="https://t.me/imballet" target="_blank" class="author-link">@imballet</a>
  </h1>
  
  <div class="controls">
    <select id="runtime">
      <option value="python:3.11">Python 3.11</option>
      <option value="cpp:gcc-12">C++17</option>
    </select>
    
    <button id="runBtn" class="run-btn" onclick="runCode()">
      ▶ <span id="runText">Run</span>
    </button>
  </div>
</header>

<div class="main-grid">
  <div id="pane-code" class="editor-pane pane-active">
    <textarea id="code"></textarea>
  </div>

  <div id="pane-io" class="io-pane">
    <div class="pane-section" style="flex: 0 0 auto;">
      <div class="pane-title">Input</div>
      <textarea id="stdin" placeholder="Stdin..."></textarea>
    </div>

    <div class="pane-section" style="flex: 1; border-bottom: none;">
      <div class="pane-title">
        Output
        <span id="statusBadge" class="status-badge status-idle">Ready</span>
      </div>
      <div class="output-container">
        <div id="stdout"></div>
        <div id="stderr"></div>
      </div>
    </div>
  </div>
</div>

<div class="mobile-tab-bar" style="display: none;">
  <button class="tab-btn active" onclick="switchTab('code')">📝 Code</button>
  <button class="tab-btn" onclick="switchTab('io')">🖥️ Output</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>

<script>
// --- Config ---
const defaults = {
  "python:3.11": `def greet(name):\n    return f"Hello, {name}!"\n\nif __name__ == "__main__":\n    print(greet("World"))`,
  "cpp:gcc-12": `#include <iostream>\n\nint main() {\n    std::cout << "Hello from C++!" << std::endl;\n    return 0;\n}`
};
const userCode = { "python:3.11": defaults["python:3.11"], "cpp:gcc-12": defaults["cpp:gcc-12"] };
const keywords = {
    python: ['print','input','def','class','return','import','from','if','else','elif','for','while','try','except','True','False'],
    cpp: ['include','using','namespace','std','cout','cin','endl','vector','string','int','void','return','if','else','for','while']
};

let currentRuntime = "python:3.11";

// --- Editor Init ---
const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
  mode: "python", theme: "dracula", lineNumbers: true, indentUnit: 4, tabSize: 4,
  smartIndent: true, autoCloseBrackets: true,
  extraKeys: { "Tab": handleTab, "Ctrl-Space": "autocomplete", "Ctrl-Enter": runCode }
});
editor.setValue(userCode[currentRuntime]);

// --- Mobile Tab Switching ---
function switchTab(tab) {
  const codePane = document.getElementById('pane-code');
  const ioPane = document.getElementById('pane-io');
  const tabs = document.querySelectorAll('.tab-btn');
  
  if (tab === 'code') {
    codePane.classList.add('pane-active');
    ioPane.classList.remove('pane-active');
    tabs[0].classList.add('active');
    tabs[1].classList.remove('active');
    editor.refresh(); // Important for CodeMirror re-render
    editor.focus();
  } else {
    codePane.classList.remove('pane-active');
    ioPane.classList.add('pane-active');
    tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
  }
}

// --- Logic ---
const runtimeSelect = document.getElementById("runtime");
runtimeSelect.addEventListener('change', () => {
  userCode[currentRuntime] = editor.getValue();
  currentRuntime = runtimeSelect.value;
  editor.setOption('mode', currentRuntime.startsWith('python') ? 'python' : 'text/x-c++src');
  editor.setValue(userCode[currentRuntime] || defaults[currentRuntime]);
  editor.clearHistory();
  resetOutput();
});

// Ghost Text
let ghostMarker = null, ghostText = "";
function clearGhost() { if(ghostMarker) ghostMarker.clear(); ghostMarker=null; ghostText=""; }
editor.on("cursorActivity", (cm) => {
  clearGhost();
  if (cm.state.completionActive || cm.somethingSelected()) return;
  const cur = cm.getCursor(), word = cm.getTokenAt(cur).string;
  if (!word || word.length < 2 || /\s/.test(word)) return;
  const lang = currentRuntime.startsWith('python')?'python':'cpp';
  const match = keywords[lang].find(k => k.startsWith(word) && k!==word);
  if (match) {
    ghostText = match.slice(word.length);
    const widget = document.createElement("span");
    widget.className = "cm-inline-completion"; widget.textContent = ghostText;
    ghostMarker = cm.setBookmark(cur, { widget, insertLeft: true });
  }
});
editor.on("blur", clearGhost);
function handleTab(cm) {
  if (ghostMarker) { cm.replaceRange(ghostText, cm.getCursor()); clearGhost(); }
  else cm.execCommand("defaultTab");
}
CodeMirror.registerHelper("hint", "custom", (cm) => {
  const cur=cm.getCursor(), token=cm.getTokenAt(cur);
  const lang = currentRuntime.startsWith('python')?'python':'cpp';
  return { list: keywords[lang].filter(k=>k.startsWith(token.string)), from: CodeMirror.Pos(cur.line, token.start), to: cur };
});
CodeMirror.commands.autocomplete = (cm) => CodeMirror.showHint(cm, CodeMirror.hint.custom);

// --- Run Logic ---
async function runCode() {
  const btn = document.getElementById("runBtn");
  if (btn.disabled) return;
  
  // Auto-switch to Output tab on mobile
  if (window.innerWidth <= 768) switchTab('io');

  resetOutput(); setStatus("running");
  btn.disabled = true; document.getElementById("runText").textContent = "Wait";

  try {
    const res = await fetch("/run", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ runtime: currentRuntime, code: editor.getValue(), stdin: document.getElementById("stdin").value })
    });
    if(!res.ok) throw new Error("Net Error");
    const data = await res.json();
    poll(data.job_id);
  } catch(e) { finish({status:'error', stderr: e.message}); }
}

async function poll(id) {
  const timer = setInterval(async()=>{
    try {
      const r = await fetch(`/jobs/${id}`);
      const d = await r.json();
      if(d.result && d.result.status!=='running' && d.result.status!=='queued') {
        clearInterval(timer); finish(d.result);
      }
    } catch(e) { clearInterval(timer); finish({status:'error', stderr:'Poll fail'}); }
  }, 500);
}

function finish(res) {
  const btn = document.getElementById("runBtn");
  btn.disabled = false; document.getElementById("runText").textContent = "Run";
  
  document.getElementById("stdout").textContent = res.stdout||"";
  document.getElementById("stderr").textContent = res.stderr||"";
  
  const isOk = ["success","finished","completed"].includes(res.status) || res.exit_code===0;
  setStatus(isOk && !res.stderr ? "success" : "error");
}

function setStatus(s) {
  const b = document.getElementById("statusBadge");
  b.className = `status-badge status-${s}`;
  b.textContent = s==='running'?'Run...':(s==='success'?'OK':(s==='error'?'ERR':'Ready'));
}
function resetOutput() {
  document.getElementById("stdout").textContent="";
  document.getElementById("stderr").textContent="";
  setStatus("idle");
}
</script>

</body>
</html>
