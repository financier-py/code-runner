<!DOCTYPE html>
<html lang="ru">
<head>
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://files.financier.com.ru/logo.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Code Runner</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #30363d;
      --accent: #2f81f7; --text-main: #e6edf3; --text-muted: #8b949e;
      --success: #238636; --error: #da3633;
      --font-ui: 'Inter', sans-serif; --font-code: 'Fira Code', monospace;
      --header-h: 60px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); font-family: var(--font-ui); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { height: var(--header-h); background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; z-index: 20; }
    .brand { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text-main); }
    .brand span { font-size: 20px; }
    .controls { display: flex; gap: 12px; }

    .select-wrapper { position: relative; }
    select { appearance: none; background: var(--bg); color: var(--text-main); border: 1px solid var(--border); padding: 8px 32px 8px 12px; border-radius: 8px; font-family: var(--font-ui); font-size: 14px; outline: none; height: 36px; }
    .select-arrow { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 10px; color: var(--text-muted); }

    .btn { height: 36px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 0 16px; border: none; color: white; transition: opacity 0.2s; }
    .run-btn { background: var(--success); }
    .share-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text-main); }
    .btn:active { opacity: 0.8; }
    .btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    .workspace { flex: 1; display: flex; overflow: hidden; position: relative; }
    .pane { width: 50%; display: flex; flex-direction: column; height: 100%; border-right: 1px solid var(--border); }
    .pane-output { width: 50%; background: #0d1117; display: flex; flex-direction: column; }

    .CodeMirror { flex: 1; font-family: var(--font-code); font-size: 14px; line-height: 1.6; background: var(--bg) !important; height: 100%; }
    .CodeMirror-gutters { background: var(--bg) !important; border-right: 1px solid var(--border); }

    .io-header { padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
    .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; background: var(--border); color: var(--text-muted); }
    .status-badge.success { background: var(--success); color: #fff; }
    .status-badge.error { background: var(--error); color: #fff; }

    textarea#stdin { width: 100%; height: 80px; background: var(--bg); border: none; border-bottom: 1px solid var(--border); color: var(--text-main); padding: 12px; font-family: var(--font-code); font-size: 13px; resize: none; outline: none; }
    .output-log { flex: 1; padding: 16px; overflow-y: auto; font-family: var(--font-code); font-size: 13px; white-space: pre-wrap; word-wrap: break-word; }
    .log-stdout { color: var(--text-main); }
    .log-stderr { color: #ff7b72; margin-top: 8px; padding-left: 10px; border-left: 2px solid var(--error); }

    .mobile-nav { display: none; height: 56px; background: var(--panel); border-top: 1px solid var(--border); z-index: 30; }
    .nav-item { flex: 1; display: flex; justify-content: center; align-items: center; color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; border-top: 2px solid transparent; }
    .nav-item.active { color: var(--accent); border-top-color: var(--accent); background: rgba(47, 129, 247, 0.05); }

    @media (max-width: 768px) {
      .workspace { display: block; }
      .pane, .pane-output { width: 100%; height: 100%; position: absolute; visibility: hidden; opacity: 0; border: none; }
      .pane.active-tab, .pane-output.active-tab { visibility: visible; opacity: 1; z-index: 10; }
      .mobile-nav { display: flex; }
      .brand-text { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="brand"><span>🚀</span><div class="brand-text">CodeRunner</div></a>
  <div class="controls">
    <div class="select-wrapper">
      <select id="runtime">
        <option value="python:3.11">Python 3.11</option>
        <option value="cpp:gcc-12">C++ 17</option>
        <option value="c:gcc-12">C (GCC 12)</option>
        <option value="node:18">Node.js 18</option>
      </select>
      <div class="select-arrow">▼</div>
    </div>
    <button id="shareBtn" class="btn share-btn" onclick="shareCode()">🔗 <span id="shareText">Share</span></button>
    <button id="runBtn" class="btn run-btn" onclick="runCode()">▶ Run</button>
  </div>
</header>

<div class="workspace">
  <div id="tab-editor" class="pane active-tab"><textarea id="code"></textarea></div>
  <div id="tab-output" class="pane-output">
    <div class="io-header">Input (stdin)</div>
    <textarea id="stdin" placeholder="Enter input..."></textarea>
    <div class="io-header">Output <span id="statusBadge" class="status-badge">READY</span></div>
    <div class="output-log"><div id="stdout" class="log-stdout"></div><div id="stderr" class="log-stderr"></div></div>
  </div>
</div>

<nav class="mobile-nav">
  <div class="nav-item active" onclick="switchTab('editor')">📝 Code</div>
  <div class="nav-item" onclick="switchTab('output')">🖥️ Console</div>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

<script>
const PRELOADED_DATA = null;
const defaults = {
  "python:3.11": `def greet(name):\n    return f"Hello, {name}!"\n\nif __name__ == "__main__":\n    print(greet("World"))`,
  "cpp:gcc-12": `#include <iostream>\n\nint main() {\n    std::cout << "Hello from C++!" << std::endl;\n    return 0;\n}`,
  "node:18": `console.log("Hello from Node.js!");`,
  "c:gcc-12": `#include <stdio.h>\n\nint main() {\n    printf("Hello from C!\\n");\n    return 0;\n}`,
};
const modeMap = { "python:3.11": "python", "cpp:gcc-12": "text/x-c++src", "node:18": "javascript", "c:gcc-12": "text/x-csrc" };

let currentRuntime = "python:3.11";
let userCode = { ...defaults };

const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
  mode: "python", theme: "dracula", lineNumbers: true, indentUnit: 4, tabSize: 4, lineWrapping: true, smartIndent: true, electricChars: false
});

const runtimeSelect = document.getElementById("runtime");

// Загрузка данных
if (PRELOADED_DATA && PRELOADED_DATA.code) {
    currentRuntime = PRELOADED_DATA.runtime;
    userCode[currentRuntime] = PRELOADED_DATA.code;
    runtimeSelect.value = currentRuntime;
    editor.setOption("mode", modeMap[currentRuntime]);
    editor.setValue(PRELOADED_DATA.code);
} else {
    editor.setValue(defaults[currentRuntime]);
}

// 1. Смена языка
runtimeSelect.addEventListener("change", () => {
  userCode[currentRuntime] = editor.getValue();
  currentRuntime = runtimeSelect.value;
  editor.setOption("mode", modeMap[currentRuntime]);
  editor.setValue(userCode[currentRuntime] || defaults[currentRuntime]);
  editor.refresh();
  resetOutput();
});

// 2. Share
async function shareCode() {
    const btn = document.getElementById("shareBtn");
    const txt = document.getElementById("shareText");
    btn.disabled = true;
    const originalText = txt.textContent;
    txt.textContent = "Saving...";

    try {
        const response = await fetch("/share", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ runtime: currentRuntime, code: editor.getValue() })
        });

        const data = await response.json();
        const fullUrl = window.location.origin + data.url;

        // Пытаемся скопировать, но не падаем если нельзя
        try {
            await navigator.clipboard.writeText(fullUrl);
            txt.textContent = "Copied!";
        } catch {
            txt.textContent = "Saved!";
            alert("Ссылка сохранена:\n" + fullUrl);
        }

        window.history.pushState({}, "", data.url);

        setTimeout(() => {
            txt.textContent = originalText;
            btn.disabled = false;
        }, 2000);

    } catch (e) {
        alert("Ошибка при сохранении");
        txt.textContent = originalText;
        btn.disabled = false;
    }
}

// 3. Табы
function switchTab(tabName) {
  const editorPane = document.getElementById("tab-editor");
  const outputPane = document.getElementById("tab-output");
  const navItems = document.querySelectorAll(".nav-item");
  if (tabName === 'editor') {
    editorPane.classList.add("active-tab"); outputPane.classList.remove("active-tab");
    navItems[0].classList.add("active"); navItems[1].classList.remove("active");
    editor.refresh(); editor.focus();
  } else {
    editorPane.classList.remove("active-tab"); outputPane.classList.add("active-tab");
    navItems[0].classList.remove("active"); navItems[1].classList.add("active");
  }
}

// 4. Run
async function runCode() {
  const btn = document.getElementById("runBtn");
  if (btn.disabled) return;
  if (window.innerWidth <= 768) switchTab('output');
  resetOutput(); setStatus("running");
  btn.disabled = true; btn.innerHTML = "⏳ Wait...";
  try {
    const res = await fetch("/run", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ runtime: currentRuntime, code: editor.getValue(), stdin: document.getElementById("stdin").value })
    });
    const data = await res.json();
    poll(data.job_id);
  } catch (e) { finish({ status: "error", stderr: e.message }); }
}

async function poll(id) {
  const timer = setInterval(async () => {
    try {
      const r = await fetch(`/jobs/${id}`);
      const d = await r.json();
      if (d.result && d.result.status !== "running" && d.result.status !== "queued") {
        clearInterval(timer); finish(d.result);
      }
    } catch (e) { clearInterval(timer); finish({ status: "error", stderr: "Lost connection" }); }
  }, 500);
}

function finish(res) {
  const btn = document.getElementById("runBtn");
  btn.disabled = false; btn.innerHTML = "▶ Run";
  document.getElementById("stdout").textContent = res.stdout || "";
  document.getElementById("stderr").textContent = res.stderr || "";
  const isSuccess = ["success", "finished", "completed"].includes(res.status) || res.exit_code === 0;
  setStatus(isSuccess && !res.stderr ? "success" : "error");
}

function setStatus(status) {
  const badge = document.getElementById("statusBadge");
  badge.className = "status-badge " + status;
  const labels = { "idle": "READY", "running": "RUNNING...", "success": "SUCCESS", "error": "ERROR" };
  badge.textContent = labels[status] || status.toUpperCase();
}

function resetOutput() {
  document.getElementById("stdout").textContent = "";
  document.getElementById("stderr").textContent = "";
  setStatus("idle");
}
</script>
</body>
</html>
