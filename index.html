<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code Runner</title>
  <style>
    :root{
      --bg: #0f0f0f;
      --panel: #1e1e1e;
      --muted: #333;
      --fg: #eee;
    }

    body {
      font-family: monospace;
      background: var(--bg);
      color: var(--fg);
      padding: 20px;
    }

    .container{
      max-width: 900px;
      margin: 0 auto;
    }

    label{ display:block; margin-top:10px; font-size:14px; }

    textarea, select, button {
      width: 100%;
      margin-top: 8px;
      background: var(--panel);
      color: var(--fg);
      border: 1px solid var(--muted);
      padding: 10px;
      box-sizing: border-box;
    }

    textarea#code{ min-height: 220px; }
    textarea#stdin{ min-height: 90px; }

    button {
      cursor: pointer;
      padding: 10px;
      font-weight: 600;
    }

    pre {
      background: #111;
      padding: 10px;
      white-space: pre-wrap;
      overflow: auto;
      word-break: break-word;
    }

    /* Mobile adjustments */
    @media (max-width: 600px){
      body{ padding: 12px; }
      h1{ font-size: 18px; margin-bottom:6px; }
      textarea, select, button{ font-size: 16px; padding: 12px; }
      textarea#code{ min-height: 180px; }
      textarea#stdin{ min-height: 80px; }
      pre{ font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="container">

<h1>Попробуй меня положить :)</h1>

<label>Runtime</label>
<select id="runtime">
  <option value="python:3.11">Python 3.11</option>
  <option value="cpp:gcc-12">C++17</option>
</select>

<label>Code</label>
<textarea id="code" rows="10">print(10)</textarea>

<label>Stdin</label>
<textarea id="stdin" rows="3"></textarea>

<button id="runBtn" onclick="runCode()">▶ Run</button>

<h3>Status</h3>
<pre id="status"></pre>

<h3>Stdout</h3>
<pre id="stdout"></pre>

<h3>Stderr</h3>
<pre id="stderr"></pre>

</div>

<script>
const codeTextarea = document.getElementById("code");
codeTextarea.addEventListener("keydown", (e) => {
  if (e.key === "Tab") {
    e.preventDefault();
    const start = codeTextarea.selectionStart;
    const end = codeTextarea.selectionEnd;
    codeTextarea.value = codeTextarea.value.substring(0, start) + "    " + codeTextarea.value.substring(end);
    codeTextarea.selectionStart = codeTextarea.selectionEnd = start + 4;
  }
});

const runBtn = document.getElementById("runBtn");
let isRunning = false;

async function runCode() {
  if (isRunning) return;
  isRunning = true;
  runBtn.disabled = true;
  runBtn.textContent = "⏳ Running...";

  document.getElementById("status").textContent = "queued...";
  document.getElementById("stdout").textContent = "";
  document.getElementById("stderr").textContent = "";

  const runtime = document.getElementById("runtime").value;
  const code = document.getElementById("code").value;
  const stdin = document.getElementById("stdin").value;

  try {
    const res = await fetch("/run", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ runtime, code, stdin })
    });

    if (!res.ok) {
      const error = await res.json();
      document.getElementById("status").textContent = "error";
      document.getElementById("stderr").textContent = error.detail || "Request failed";
      runBtn.disabled = false;
      runBtn.textContent = "▶ Run";
      isRunning = false;
      return;
    }

    const data = await res.json();
    pollResult(data.job_id);
  } catch (error) {
    document.getElementById("status").textContent = "error";
    document.getElementById("stderr").textContent = "Network error: " + error.message;
    runBtn.disabled = false;
    runBtn.textContent = "▶ Run";
    isRunning = false;
  }
}

async function pollResult(jobId) {
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`/jobs/${jobId}`);
      
      if (!res.ok) {
        clearInterval(interval);
        document.getElementById("status").textContent = "error";
        document.getElementById("stderr").textContent = "Failed to fetch job status";
        runBtn.disabled = false;
        runBtn.textContent = "▶ Run";
        isRunning = false;
        return;
      }

      const job = await res.json();

      if (!job.result) return;

      document.getElementById("status").textContent = job.result.status;
      document.getElementById("stdout").textContent = job.result.stdout;
      document.getElementById("stderr").textContent = job.result.stderr;

      if (job.result.status !== "running") {
        clearInterval(interval);
        runBtn.disabled = false;
        runBtn.textContent = "▶ Run";
        isRunning = false;
      }
    } catch (error) {
      clearInterval(interval);
      document.getElementById("status").textContent = "error";
      document.getElementById("stderr").textContent = "Poll error: " + error.message;
      runBtn.disabled = false;
      runBtn.textContent = "▶ Run";
      isRunning = false;
    }
  }, 500);
}
</script>

</body>
</html>
