services:
  redis:
    image: redis:7
    restart: unless-stopped

  dind:
    image: docker:24-dind
    privileged: true
    restart: unless-stopped
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - sandbox_data:/opt/code_runner_sandbox

  # 👇 Прогрев образов (выполняется и завершается)
  prewarm:
    image: docker:24-cli
    depends_on:
      - dind
    environment:
      - DOCKER_HOST=tcp://dind:2375
    entrypoint: >
      sh -c "
        echo 'Waiting for Docker daemon...' ;
        until docker info >/dev/null 2>&1; do sleep 1; done ;

        echo 'Pre-pulling runtime images...' ;
        docker pull python:3.11-slim ;
        docker pull gcc:12 ;
        docker pull node:18-slim ;

        echo 'Prewarm complete.'
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      - redis
      - dind
      - prewarm   # ⬅️ ждём, пока образы скачаются
    environment:
      - REDIS_HOST=redis
      - DOCKER_HOST=tcp://dind:2375
      - SANDBOX_WORKDIR=/opt/code_runner_sandbox
    volumes:
      - sandbox_data:/opt/code_runner_sandbox

volumes:
  sandbox_data: